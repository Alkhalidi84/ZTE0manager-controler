<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b3b5e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- app-icon squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="#ffffff" opacity="0.06"/>

  <g filter="url(#soft)">
    <!-- radiating 5G signal arcs from the tower point -->
    <g fill="none" stroke="#ffffff" stroke-linecap="round">
      <path d="M300 470 a300 300 0 0 1 424 0" stroke-opacity="0.35" stroke-width="34"/>
      <path d="M366 536 a208 208 0 0 1 292 0" stroke-opacity="0.55" stroke-width="34"/>
      <path d="M432 602 a116 116 0 0 1 160 0" stroke-opacity="0.8" stroke-width="34"/>
    </g>

    <!-- center emitter dot -->
    <circle cx="512" cy="660" r="40" fill="#ffffff"/>

    <!-- ascending signal bars -->
    <g fill="url(#bars)">
      <rect x="560" y="648" width="70" height="120" rx="22"/>
      <rect x="658" y="576" width="70" height="192" rx="22"/>
      <rect x="756" y="492" width="70" height="276" rx="22"/>
    </g>
  </g>
</svg>
