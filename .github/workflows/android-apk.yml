name: Build Android APK

# Builds an installable Android APK in the cloud (no local Android SDK needed)
# and publishes it to a "latest" GitHub Release so anyone visiting the repo can
# download it directly — even without a GitHub account.
#
# Run it from the Actions tab (Run workflow) or it runs on every push to main.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write # needed to publish the Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons
        run: npx capacitor-assets generate --android --assetPath resources

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ZTE-Router-Manager.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZTE-Router-Manager-apk
          path: ZTE-Router-Manager.apk
          if-no-files-found: error

      - name: Publish to "latest" Release (public download link)
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: 'ZTE Router Manager — Android APK'
          body: |
            📥 **Download `ZTE-Router-Manager.apk` below and install it on Android**
            (enable *Install unknown apps*). Connect your phone to the router's Wi‑Fi.

            Rebuilt automatically from the latest source.
          artifacts: 'ZTE-Router-Manager.apk'
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
